version: '3.8'

services:
  # Test Database
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devnous_e2e_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-<set-test-postgres-password>}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./devnous_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./devnous_context_schema.sql:/docker-entrypoint-initdb.d/02-context.sql
      - ./enterprise_messaging_schema.sql:/docker-entrypoint-initdb.d/03-messaging.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d devnous_e2e_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test Redis
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Test Kafka
  zookeeper-test:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"
    volumes:
      - zk_test_data:/var/lib/zookeeper/data
      - zk_test_logs:/var/lib/zookeeper/log

  kafka-test:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper-test
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-test:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_test_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9093", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Message Hub Service for E2E Testing
  message-hub-test:
    build:
      context: .
      dockerfile: Dockerfile.message-hub
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      kafka-test:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=e2e_test
      - DATABASE_URL=postgresql://testuser:${TEST_POSTGRES_PASSWORD:-<set-test-postgres-password>}@postgres-test:5432/devnous_e2e_test
      - REDIS_URL=redis://redis-test:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka-test:9093
      - LOG_LEVEL=DEBUG
      - ENABLE_CORS=true
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - ./devnous:/app/devnous
      - ./tests:/app/tests
    command: |
      sh -c "
        echo 'Waiting for services to be ready...'
        sleep 30
        echo 'Creating Kafka topics...'
        kafka-topics --create --bootstrap-server kafka-test:9093 --topic devnous-messages --partitions 3 --replication-factor 1 --if-not-exists
        kafka-topics --create --bootstrap-server kafka-test:9093 --topic devnous-events --partitions 3 --replication-factor 1 --if-not-exists
        echo 'Starting Message Hub...'
        python -m uvicorn devnous.message_hub.api:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dashboard for E2E Testing
  dashboard-test:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    depends_on:
      - message-hub-test
    ports:
      - "8080:80"
    environment:
      - API_BASE_URL=http://message-hub-test:8000
      - ENVIRONMENT=test
    volumes:
      - ./dashboard:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mock External Services for Testing
  slack-mock:
    image: mockserver/mockserver:5.15.0
    ports:
      - "1080:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/slack-expectations.json
    volumes:
      - ./tests/mocks/slack-expectations.json:/config/slack-expectations.json

  telegram-mock:
    image: mockserver/mockserver:5.15.0
    ports:
      - "1081:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/telegram-expectations.json
    volumes:
      - ./tests/mocks/telegram-expectations.json:/config/telegram-expectations.json

  whatsapp-mock:
    image: mockserver/mockserver:5.15.0
    ports:
      - "1082:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/whatsapp-expectations.json
    volumes:
      - ./tests/mocks/whatsapp-expectations.json:/config/whatsapp-expectations.json

volumes:
  postgres_test_data:
  redis_test_data:
  kafka_test_data:
  zk_test_data:
  zk_test_logs:
