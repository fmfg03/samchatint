[pytest]
addopts = -ra --strict-markers --asyncio-mode=auto --cov-fail-under=85
testpaths = tests
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance and benchmarking tests
    smoke: Smoke tests
    concurrent: Concurrency tests
    cache: Caching tests
    slow: Slow tests
    flaky: Flaky tests
    database: Database operations tests
    redis: Redis cache tests
    kafka: Kafka streaming tests
    production_critical: Production critical tests

